AWSTemplateFormatVersion: '2010-09-09'
Description: Root Stack for Photo Uploader Infrastructure

Parameters:
  GitHubOrg:
    Type: String
    Default: peprah12git
    Description: GitHub organization or username

  GitHubRepo:
    Type: String
    Default: photo-uploader
    Description: GitHub repository name

  DBName:
    Type: String
    Default: photouploader
    Description: Database name

  DBUsername:
    Type: String
    Default: adminuser
    Description: Database master username

  DBPassword:
    Type: String
    NoEcho: true
    Description: Database master password

  CFNTemplatesBucket:
    Type: String
    Description: S3 bucket name for CloudFormation templates

  CreateOIDCProvider:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to false if OIDC provider already exists in this account

Resources:
  # ─── ECR Stack ─────────────────────────────────────────────────
  ECRStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://s3.eu-central-1.amazonaws.com/${CFNTemplatesBucket}/templates/ecr.yml"
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── OIDC Stack ────────────────────────────────────────────────
  OIDCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://s3.eu-central-1.amazonaws.com/${CFNTemplatesBucket}/templates/oidc.yml"
      Parameters:
        GitHubOrg: !Ref GitHubOrg
        GitHubRepo: !Ref GitHubRepo
        CreateOIDCProvider: !Ref CreateOIDCProvider
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── VPC Stack ─────────────────────────────────────────────────
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://s3.eu-central-1.amazonaws.com/${CFNTemplatesBucket}/templates/vpc.yml"
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── Security Groups Stack ─────────────────────────────────────
  SecurityGroupsStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCStack
    Properties:
      TemplateURL: !Sub "https://s3.eu-central-1.amazonaws.com/${CFNTemplatesBucket}/templates/security-groups.yml"
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.photo-uploader-VPCId
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── VPC Endpoints Stack ───────────────────────────────────────
  VPCEndpointsStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SecurityGroupsStack
    Properties:
      TemplateURL: !Sub "https://s3.eu-central-1.amazonaws.com/${CFNTemplatesBucket}/templates/vpc-endpoints.yml"
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.photo-uploader-VPCId
        PrivateSubnet1Id: !GetAtt VPCStack.Outputs.photo-uploader-PrivateSubnet1Id
        PrivateSubnet2Id: !GetAtt VPCStack.Outputs.photo-uploader-PrivateSubnet2Id
        PrivateRouteTableId: !GetAtt VPCStack.Outputs.photo-uploader-PrivateRouteTableId
        VPCEndpointSecurityGroupId: !GetAtt SecurityGroupsStack.Outputs.photo-uploader-VPCEndpointSecurityGroupId
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── S3 and CloudFront Stack ───────────────────────────────────
  S3CloudFrontStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://s3.eu-central-1.amazonaws.com/${CFNTemplatesBucket}/templates/s3-cloudfront.yml"
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── RDS Stack ─────────────────────────────────────────────────
  RDSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SecurityGroupsStack
    Properties:
      TemplateURL: !Sub "https://s3.eu-central-1.amazonaws.com/${CFNTemplatesBucket}/templates/rds.yml"
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.photo-uploader-VPCId
        PrivateSubnet1Id: !GetAtt VPCStack.Outputs.photo-uploader-PrivateSubnet1Id
        PrivateSubnet2Id: !GetAtt VPCStack.Outputs.photo-uploader-PrivateSubnet2Id
        RDSSecurityGroupId: !GetAtt SecurityGroupsStack.Outputs.photo-uploader-RDSSecurityGroupId
        DBName: !Ref DBName
        DBUsername: !Ref DBUsername
        DBPassword: !Ref DBPassword
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── ALB Stack ─────────────────────────────────────────────────
  ALBStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VPCEndpointsStack
    Properties:
      TemplateURL: !Sub "https://s3.eu-central-1.amazonaws.com/${CFNTemplatesBucket}/templates/alb.yml"
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.photo-uploader-VPCId
        PublicSubnet1Id: !GetAtt VPCStack.Outputs.photo-uploader-PublicSubnet1Id
        PublicSubnet2Id: !GetAtt VPCStack.Outputs.photo-uploader-PublicSubnet2Id
        ALBSecurityGroupId: !GetAtt SecurityGroupsStack.Outputs.photo-uploader-ALBSecurityGroupId
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── ECS Stack ─────────────────────────────────────────────────
  ECSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - ALBStack
      - RDSStack
      - S3CloudFrontStack
    Properties:
      TemplateURL: !Sub "https://s3.eu-central-1.amazonaws.com/${CFNTemplatesBucket}/templates/ecs.yml"
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.photo-uploader-VPCId
        PrivateSubnet1Id: !GetAtt VPCStack.Outputs.photo-uploader-PrivateSubnet1Id
        PrivateSubnet2Id: !GetAtt VPCStack.Outputs.photo-uploader-PrivateSubnet2Id
        ECSSecurityGroupId: !GetAtt SecurityGroupsStack.Outputs.photo-uploader-ECSSecurityGroupId
        BlueTargetGroupArn: !GetAtt ALBStack.Outputs.photo-uploader-BlueTargetGroupArn
        ECRRepositoryUri: !GetAtt ECRStack.Outputs.photo-uploader-ECRRepositoryUri
        S3BucketName: !GetAtt S3CloudFrontStack.Outputs.photo-uploader-PhotoBucketName
        CloudFrontDomain: !GetAtt S3CloudFrontStack.Outputs.photo-uploader-CloudFrontDomainName
        DBHost: !GetAtt RDSStack.Outputs.photo-uploader-DBInstanceEndpoint
        DBName: !Ref DBName
        DBUsername: !Ref DBUsername
        DBPassword: !Ref DBPassword
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── Pipeline Stack ────────────────────────────────────────────
  PipelineStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: ECSStack
    Properties:
      TemplateURL: !Sub "https://s3.eu-central-1.amazonaws.com/${CFNTemplatesBucket}/templates/pipeline.yml"
      Parameters:
        ECSClusterName: !GetAtt ECSStack.Outputs.photo-uploader-ECSClusterName
        ECSServiceName: !GetAtt ECSStack.Outputs.photo-uploader-ECSServiceName
        BlueTargetGroupArn: !GetAtt ALBStack.Outputs.photo-uploader-BlueTargetGroupArn
        GreenTargetGroupArn: !GetAtt ALBStack.Outputs.photo-uploader-GreenTargetGroupArn
        HTTPListenerArn: !GetAtt ALBStack.Outputs.photo-uploader-HTTPListenerArn
        TestListenerArn: !GetAtt ALBStack.Outputs.photo-uploader-TestListenerArn
        ECRRepositoryName: !GetAtt ECRStack.Outputs.photo-uploader-ECRRepositoryName
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  ECRRepositoryUri:
    Description: ECR Repository URI
    Value: !GetAtt ECRStack.Outputs.photo-uploader-ECRRepositoryUri

  GitHubActionsRoleArn:
    Description: IAM Role ARN for GitHub Actions
    Value: !GetAtt OIDCStack.Outputs.photo-uploader-GitHubActionsRoleArn

  ALBDNSName:
    Description: ALB DNS Name
    Value: !GetAtt ALBStack.Outputs.photo-uploader-ALBDNSName

  CloudFrontDomainName:
    Description: CloudFront Domain Name
    Value: !GetAtt S3CloudFrontStack.Outputs.photo-uploader-CloudFrontDomainName

  DBEndpoint:
    Description: RDS PostgreSQL Endpoint
    Value: !GetAtt RDSStack.Outputs.photo-uploader-DBInstanceEndpoint

  ECSClusterName:
    Description: ECS Cluster Name
    Value: !GetAtt ECSStack.Outputs.photo-uploader-ECSClusterName

  CodePipelineName:
    Description: CodePipeline Name
    Value: !GetAtt PipelineStack.Outputs.photo-uploader-CodePipelineName

  GitHubActionsInfraRoleArn:
    Description: IAM Role ARN for GitHub Actions Infra Repo
    Value: !GetAtt OIDCStack.Outputs.photo-uploader-GitHubActionsInfraRoleArn