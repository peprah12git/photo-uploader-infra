AWSTemplateFormatVersion: '2010-09-09'
Description: RDS PostgreSQL for Photo Uploader

Parameters:
  VPCId:
    Type: String
    Description: VPC ID

  PrivateSubnet1Id:
    Type: String
    Description: Private Subnet 1 ID

  PrivateSubnet2Id:
    Type: String
    Description: Private Subnet 2 ID

  RDSSecurityGroupId:
    Type: String
    Description: RDS Security Group ID

  DBName:
    Type: String
    Default: photouploader
    Description: Database name

  DBUsername:
    Type: String
    Default: adminuser
    Description: Database master username

  DBPassword:
    Type: String
    NoEcho: true
    Description: Database master password
    MinLength: 8

Resources:
  # ─── DB Subnet Group ───────────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: photo-uploader-db-subnet-group
      DBSubnetGroupDescription: Subnet group for Photo Uploader RDS
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      Tags:
        - Key: Name
          Value: photo-uploader-db-subnet-group
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── RDS Parameter Group ───────────────────────────────────────
  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      DBParameterGroupName: photo-uploader-db-param-group
      Description: Parameter group for Photo Uploader RDS PostgreSQL
      Family: postgres15
      Tags:
        - Key: Name
          Value: photo-uploader-db-param-group
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── RDS PostgreSQL Instance ───────────────────────────────────
  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: photo-uploader-db
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '15'
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: '20'
      StorageType: gp2
      StorageEncrypted: true
      MultiAZ: false
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: !Ref DBParameterGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroupId
      BackupRetentionPeriod: 7
      PreferredBackupWindow: 03:00-04:00
      PreferredMaintenanceWindow: mon:04:00-mon:05:00
      EnablePerformanceInsights: false
      AutoMinorVersionUpgrade: true
      CopyTagsToSnapshot: true
      Tags:
        - Key: Name
          Value: photo-uploader-db
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  DBInstanceEndpoint:
    Description: RDS PostgreSQL Endpoint
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: photo-uploader-DBInstanceEndpoint

  DBInstancePort:
    Description: RDS PostgreSQL Port
    Value: !GetAtt DBInstance.Endpoint.Port
    Export:
      Name: photo-uploader-DBInstancePort

  DBName:
    Description: Database Name
    Value: !Ref DBName
    Export:
      Name: photo-uploader-DBName

  DBSubnetGroupName:
    Description: DB Subnet Group Name
    Value: !Ref DBSubnetGroup
    Export:
      Name: photo-uploader-DBSubnetGroupName