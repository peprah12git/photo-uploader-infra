AWSTemplateFormatVersion: '2010-09-09'
Description: Application Load Balancer, Target Groups and Listeners

Parameters:
  VPCId:
    Type: String
    Description: VPC ID

  PublicSubnet1Id:
    Type: String
    Description: Public Subnet 1 ID

  PublicSubnet2Id:
    Type: String
    Description: Public Subnet 2 ID

  ALBSecurityGroupId:
    Type: String
    Description: ALB Security Group ID

Resources:
  # ─── Application Load Balancer ─────────────────────────────────
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: photo-uploader-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      SecurityGroups:
        - !Ref ALBSecurityGroupId
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '60'
        - Key: deletion_protection.enabled
          Value: 'false'
      Tags:
        - Key: Name
          Value: photo-uploader-alb
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── Blue Target Group ─────────────────────────────────────────
  BlueTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: photo-uploader-blue-tg
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPCId
      HealthCheckEnabled: true
      HealthCheckPath: /actuator/health
      HealthCheckProtocol: HTTP
      HealthCheckPort: '8080'
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: photo-uploader-blue-tg
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── Green Target Group ────────────────────────────────────────
  GreenTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: photo-uploader-green-tg
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPCId
      HealthCheckEnabled: true
      HealthCheckPath: /actuator/health
      HealthCheckProtocol: HTTP
      HealthCheckPort: '8080'
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: photo-uploader-green-tg
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── HTTP Listener ─────────────────────────────────────────────
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BlueTargetGroup

  # ─── Test Listener (for CodeDeploy green environment) ──────────
  TestListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 8080
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref GreenTargetGroup

Outputs:
  ALBArn:
    Description: ALB ARN
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: photo-uploader-ALBArn

  ALBDNSName:
    Description: ALB DNS Name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: photo-uploader-ALBDNSName

  BlueTargetGroupArn:
    Description: Blue Target Group ARN
    Value: !Ref BlueTargetGroup
    Export:
      Name: photo-uploader-BlueTargetGroupArn

  GreenTargetGroupArn:
    Description: Green Target Group ARN
    Value: !Ref GreenTargetGroup
    Export:
      Name: photo-uploader-GreenTargetGroupArn

  HTTPListenerArn:
    Description: HTTP Listener ARN
    Value: !Ref HTTPListener
    Export:
      Name: photo-uploader-HTTPListenerArn

  TestListenerArn:
    Description: Test Listener ARN
    Value: !Ref TestListener
    Export:
      Name: photo-uploader-TestListenerArn