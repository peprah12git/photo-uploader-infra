AWSTemplateFormatVersion: '2010-09-09'
Description: Security Groups for ALB, ECS Tasks, RDS and VPC Endpoints

Parameters:
  VPCId:
    Type: String
    Description: VPC ID

Resources:
  # ─── ALB Security Group ────────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: photo-uploader-alb-sg
      GroupDescription: Security group for Application Load Balancer
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP traffic from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS traffic from internet
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: Allow outbound traffic to ECS tasks
      Tags:
        - Key: Name
          Value: photo-uploader-alb-sg
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── ECS Security Group ────────────────────────────────────────
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: photo-uploader-ecs-sg
      GroupDescription: Security group for ECS Tasks
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow traffic only from ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: photo-uploader-ecs-sg
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── RDS Security Group ────────────────────────────────────────
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: photo-uploader-rds-sg
      GroupDescription: Security group for RDS PostgreSQL
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ECSSecurityGroup
          Description: Allow PostgreSQL traffic from ECS tasks only
      Tags:
        - Key: Name
          Value: photo-uploader-rds-sg
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── VPC Endpoints Security Group ─────────────────────────────
  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: photo-uploader-vpce-sg
      GroupDescription: Security group for VPC Endpoints
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref ECSSecurityGroup
          Description: Allow HTTPS traffic from ECS tasks to VPC Endpoints
      Tags:
        - Key: Name
          Value: photo-uploader-vpce-sg
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  ALBSecurityGroupId:
    Description: ALB Security Group ID
    Value: !Ref ALBSecurityGroup
    Export:
      Name: photo-uploader-ALBSecurityGroupId

  ECSSecurityGroupId:
    Description: ECS Security Group ID
    Value: !Ref ECSSecurityGroup
    Export:
      Name: photo-uploader-ECSSecurityGroupId

  RDSSecurityGroupId:
    Description: RDS Security Group ID
    Value: !Ref RDSSecurityGroup
    Export:
      Name: photo-uploader-RDSSecurityGroupId

  VPCEndpointSecurityGroupId:
    Description: VPC Endpoint Security Group ID
    Value: !Ref VPCEndpointSecurityGroup
    Export:
      Name: photo-uploader-VPCEndpointSecurityGroupId