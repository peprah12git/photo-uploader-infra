AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Cluster, Task Definition, Service and Auto Scaling

Parameters:
  VPCId:
    Type: String
    Description: VPC ID

  PrivateSubnet1Id:
    Type: String
    Description: Private Subnet 1 ID

  PrivateSubnet2Id:
    Type: String
    Description: Private Subnet 2 ID

  ECSSecurityGroupId:
    Type: String
    Description: ECS Security Group ID

  BlueTargetGroupArn:
    Type: String
    Description: Blue Target Group ARN

  ECRRepositoryUri:
    Type: String
    Description: ECR Repository URI

  S3BucketName:
    Type: String
    Description: S3 Bucket Name for photo storage

  CloudFrontDomain:
    Type: String
    Description: CloudFront Domain for serving images

  DBHost:
    Type: String
    Description: RDS PostgreSQL endpoint

  DBName:
    Type: String
    Description: RDS Database name

  DBUsername:
    Type: String
    Description: RDS Database username

  DBPassword:
    Type: String
    NoEcho: true
    Description: RDS Database password

Resources:
  # ─── ECS Cluster ───────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: photo-uploader-cluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Name
          Value: photo-uploader-cluster
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── CloudWatch Log Group ──────────────────────────────────────
  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/photo-uploader
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── ECS Task Execution Role ───────────────────────────────────
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: photo-uploader-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ECRAndLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/photo-uploader/db/password*"
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── ECS Task Role ─────────────────────────────────────────────
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: photo-uploader-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ECSTaskPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Sid: S3PhotoAccess
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${S3BucketName}"
                  - !Sub "arn:aws:s3:::${S3BucketName}/*"
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── ECS Task Definition ───────────────────────────────────────
  ECSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: photo-uploader-task
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: photo-uploader
          Image: !Sub "${ECRRepositoryUri}:latest"
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Essential: true
          Environment:
            - Name: S3_BUCKET_NAME
              Value: !Ref S3BucketName
            - Name: CLOUDFRONT_DOMAIN
              Value: !Ref CloudFrontDomain
            - Name: DB_HOST
              Value: !Ref DBHost
            - Name: DB_NAME
              Value: !Ref DBName
            - Name: DB_USERNAME
              Value: !Ref DBUsername
            - Name: DB_PASSWORD
              Value: !Ref DBPassword
            - Name: AWS_REGION
              Value: !Sub "${AWS::Region}"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/photo-uploader
              awslogs-region: !Sub "${AWS::Region}"
              awslogs-stream-prefix: ecs
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── ECS Service ───────────────────────────────────────────────
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: photo-uploader-service
      Cluster: !Ref ECSCluster
      DesiredCount: 0 
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id
          SecurityGroups:
            - !Ref ECSSecurityGroupId
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: photo-uploader
          ContainerPort: 8080
          TargetGroupArn: !Ref BlueTargetGroupArn
      DeploymentController:
        Type: CODE_DEPLOY
      HealthCheckGracePeriodSeconds: 180
      Tags:
        - Key: Name
          Value: photo-uploader-service
        - Key: Project
          Value: photo-uploader
        - Key: ManagedBy
          Value: CloudFormation

  # ─── Auto Scaling ──────────────────────────────────────────────
  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: ECSService
    Properties:
      MinCapacity: 1
      MaxCapacity: 4
      ResourceId: !Sub service/${ECSCluster}/${ECSService.Name}
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService

  AutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: photo-uploader-cpu-scaling-policy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  ECSClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
    Export:
      Name: photo-uploader-ECSClusterName

  ECSClusterArn:
    Description: ECS Cluster ARN
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: photo-uploader-ECSClusterArn

  ECSServiceName:
    Description: ECS Service Name
    Value: !GetAtt ECSService.Name
    Export:
      Name: photo-uploader-ECSServiceName

  ECSTaskExecutionRoleArn:
    Description: ECS Task Execution Role ARN
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: photo-uploader-ECSTaskExecutionRoleArn