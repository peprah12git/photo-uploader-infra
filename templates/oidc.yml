AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Roles for GitHub Actions

Parameters:
  GitHubOrg:
    Type: String
    Default: peprah12git
    Description: GitHub organization or username

  GitHubRepo:
    Type: String
    Default: photo-uploader
    Description: GitHub repository name

  CreateOIDCProvider:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to false if OIDC provider already exists in this account

Conditions:
  ShouldCreateOIDCProvider: !Equals [!Ref CreateOIDCProvider, 'true']

Resources:
  # ─── GitHub OIDC Provider ──────────────────────────────────────
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDCProvider
    DeletionPolicy: Retain
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  # ─── GitHub Actions App Role ───────────────────────────────────
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PhotoUploaderGitHubActionsRole
      Description: Role assumed by GitHub Actions to push images to ECR
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref/heads/main"
      Policies:
        - PolicyName: ECRPushPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuthentication
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: ECRPushImage
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/photo-uploader"
              - Sid: S3ArtifactUpload
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::photo-uploader-artifacts-${AWS::AccountId}/templates/*"
              - Sid: ReadStackExports
                Effect: Allow
                Action:
                  - cloudformation:ListExports
                Resource: "*"
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: Environment
          Value: production
        - Key: ManagedBy
          Value: CloudFormation

  # ─── GitHub Actions Infra Role ─────────────────────────────────
  GitHubActionsInfraRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PhotoUploaderGitHubActionsInfraRole
      Description: Role assumed by GitHub Actions in infra repo to sync templates to S3
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/photo-uploader-infra:ref/heads/main"
      Policies:
        - PolicyName: S3TemplatesSyncPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::photo-uploader-cfn-templates-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::photo-uploader-cfn-templates-${AWS::AccountId}/*"
      Tags:
        - Key: Project
          Value: photo-uploader
        - Key: Environment
          Value: production
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  GitHubActionsRoleArn:
    Description: IAM Role ARN for GitHub Actions
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: photo-uploader-GitHubActionsRoleArn

  GitHubActionsInfraRoleArn:
    Description: IAM Role ARN for GitHub Actions Infra Repo
    Value: !GetAtt GitHubActionsInfraRole.Arn
    Export:
      Name: photo-uploader-GitHubActionsInfraRoleArn