AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Roles for GitHub Actions

Parameters:
  GitHubOrg:
    Type: String
    Default: peprah12git
    Description: GitHub organization or username

  GitHubRepo:
    Type: String
    Default: ecs-java-web-app
    Description: GitHub repository name

Resources:
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsECRRole
      Description: Role assumed by GitHub Actions to push images to ECR
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: ECRPushPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuthentication
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: ECRPushImage
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/ecs-java-web-app"
              - Sid: S3ArtifactUpload
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::ecs-java-web-app-artifacts-${AWS::AccountId}/templates/*"
      Tags:
        - Key: Project
          Value: ecs-java-web-app
        - Key: Environment
          Value: production
        - Key: ManagedBy
          Value: CloudFormation

  GitHubActionsInfraRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsInfraRole
      Description: Role assumed by GitHub Actions in infra repo to sync templates to S3
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/ecs-java-infras:*"
      Policies:
        - PolicyName: S3TemplatesSyncPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::ecs-java-web-app-cfn-templates
                  - arn:aws:s3:::ecs-java-web-app-cfn-templates/*
      Tags:
        - Key: Project
          Value: ecs-java-web-app
        - Key: Environment
          Value: production
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  GitHubActionsRoleArn:
    Description: IAM Role ARN for GitHub Actions
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: GitHubActionsRoleArn

  GitHubActionsInfraRoleArn:
    Description: IAM Role ARN for GitHub Actions Infra Repo
    Value: !GetAtt GitHubActionsInfraRole.Arn
    Export:
      Name: GitHubActionsInfraRoleArn